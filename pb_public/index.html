<!DOCTYPE html>
<head>
    <title>Mini Mochi 的相簿</title>
    <meta name="keywords" content="" />
    <meta name="description" content="" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='http://fonts.googleapis.com/css?family=Open+Sans:400,300,700' rel='stylesheet' type='text/css'>
    <link href="css/materialdesignicons.min.css" rel="stylesheet" type="text/css">
    <link href="css/magnific-popup.css" rel="stylesheet">
    <link href="css/templatemo_style.css" rel="stylesheet" type="text/css">
    <link href="css/quill.snow.css" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <div id="dynamic-content">
            <!-- Content will be loaded here -->
        </div>
        <footer>
            <p>Copyright &copy; <span id="current-year"></span> JasonTech</p>
            <div class="social right">
                <a href="#"><i class="mdi mdi-facebook"></i></a>
                <a href="#"><i class="mdi mdi-twitter"></i></a>
                <a href="#"><i class="mdi mdi-instagram"></i></a>
                <a href="#"><i class="mdi mdi-linkedin"></i></a>
            </div>
        </footer>
    </div>
    <script type="text/javascript" src="js/jquery-3.7.1.min.js"></script>
    <script type="text/javascript" src="js/jquery.easing.min.js"></script>
    <script type="text/javascript" src="js/modernizr.min.js"></script>
    <script type="text/javascript" src="js/jquery.magnific-popup.min.js"></script>
    <script src="js/pocketbase.umd.js"></script>
    <script src="js/quill.min.js"></script>
    <script>
        // Dynamic timestamp to prevent caching
        document.write('<script src="js/gallery.js?t=' + Date.now() + '"><\/script>');
    </script>
    <script>
        $(function () {
            const hash = window.location.hash.substring(1) || 'home';
            generateNav(hash);
            loadContent(hash);
            $('#current-year').text(new Date().getFullYear());

            // Handle hash changes
            $(window).on('hashchange', function() {
                const newHash = window.location.hash.substring(1) || 'home';
                // Remove existing nav to regenerate
                $('nav').remove();
                generateNav(newHash);
                loadContent(newHash);
            });
        });
    </script>
</body>
</html>
